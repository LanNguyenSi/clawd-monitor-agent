name: Publish to npm

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Preflight — verify NPM_TOKEN secret is set
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is not configured. Add it under Settings → Secrets and variables → Actions before tagging a release." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Verify package.json version matches tag
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "Tag version ($tag_version) does not match package.json ($pkg_version)" >&2
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
